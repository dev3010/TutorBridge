spring.application.name=TutorBridge

# Local MySQL configuration (connect to MySQL running on your PC)
spring.datasource.url=jdbc:mysql://localhost:3306/tutorbridge?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
