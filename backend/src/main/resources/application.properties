spring.application.name=TutorBridge

# PostgreSQL / Supabase configuration (values can come from environment variables)
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://db.onbciwbubqiusbqtynhj.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8080

# JWT configuration (use a strong random secret in real deployments)
tutorbridge.jwt.secret=${TUTORBRIDGE_JWT_SECRET:ChangeThisSecretKeyToAStrongRandomValue123456}
tutorbridge.jwt.expiration-ms=86400000

